name: Frontend CI

on:
  push:
    branches:
      - main

jobs:
  verify:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn run lint

      - name: Build Next.js app
        run: yarn run build

      - name: Run TypeScript checks
        run: yarn run typecheck

  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clean up stale tags
        run: |
          # Get the next version that commit-and-tag-version would create
          NEXT_VERSION=$(npx commit-and-tag-version --dry-run | grep "tagging release" | sed 's/.*tagging release //')
          if [ -n "$NEXT_VERSION" ]; then
            echo "Next version tag: $NEXT_VERSION"
            # Delete local tag if it exists
            git tag -d "$NEXT_VERSION" 2>/dev/null || true
            # Delete remote tag if it exists
            git push origin --delete "$NEXT_VERSION" 2>/dev/null || true
          fi

      - name: Run release
        run: yarn release

      - name: Push version bump and tag
        run: git push --follow-tags origin main

      - name: Get release version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
